version: '3.8'

services:
  # 1. Le conteneur de la Base de Données MySQL
  db-pharmacie:
    image: mysql:8.0
    container_name: mysql-pharmacie
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pharmacie_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # 🌟 AJOUT : Ce bloc teste si MySQL répond aux requêtes en interne
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 2. Le conteneur de ton application Spring Boot
  app-pharmacie:
    build: .
    container_name: spring-pharmacie
    ports:
      - "8080:8080"
    # 🌟 MODIFICATION : Spring attend que db-pharmacie passe à l'état "healthy" (sain/prêt)
    depends_on:
      db-pharmacie:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-pharmacie:3306/pharmacie_db?useSSL=false&allowPublicKeyRetrieval=true

volumes:
  mysql_data: